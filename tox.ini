;  See https://tox.wiki/en/4.23.2/
[tox]
requires =
    tox>=4
    tox-uv
envlist =
    py3{12,13,14}-{latest}
skip_missing_interpreters = true


; ENVIRONMENTS
; ------------
[testenv]
extras =
    latest: test,optional
commands =
    latest: coverage erase


[min_python]
description = minimum python version
skip_install = false
base_python = 3.12


[global_var]
passenv =
    CI
    USERNAME
    # Pass user color preferences through
    PY_COLORS
    FORCE_COLOR
    NO_COLOR
    CLICOLOR
    CLICOLOR_FORCE


; COMMANDS
; --------
[testenv:latest]
description = Run tests on latest version of all dependencies (plotting not included).
passenv = {[global_var]passenv}
commands =
    pytest -n auto -x

